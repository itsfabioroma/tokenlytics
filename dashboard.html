<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokenlytics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
      background: #0a0a0a;
      color: #c8c8c8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container { max-width: 640px; width: 100%; }

    /* ascii header */
    .ascii-header {
      color: #666;
      font-size: 11px;
      line-height: 1.3;
      margin-bottom: 32px;
      white-space: pre;
    }

    /* main token display */
    .token-display {
      border: 1px solid #222;
      padding: 32px;
      margin-bottom: 16px;
    }
    .token-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .token-value {
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
    }

    /* breakdown rows */
    .breakdown {
      border: 1px solid #222;
      border-top: none;
      padding: 16px 32px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid #151515;
    }
    .row:last-child { border: none; }
    .row .label { color: #555; }
    .row .val { color: #999; font-variant-numeric: tabular-nums; }
    .row.highlight .val { color: #c084fc; }

    /* model section */
    .section {
      margin-top: 24px;
      border: 1px solid #222;
      padding: 16px 32px;
    }
    .section-title {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* bar chart ascii style */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0;
      font-size: 12px;
    }
    .bar-label { width: 140px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar { flex: 1; height: 8px; background: #151515; position: relative; }
    .bar-fill { height: 100%; background: #333; transition: width 0.3s; }
    .bar-val { width: 100px; text-align: right; color: #666; font-variant-numeric: tabular-nums; }

    /* footer */
    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: #333;
      text-align: center;
    }
    .dot { color: #34d399; animation: blink 2s infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
  </style>
</head>
<body>
  <div class="container">

    <!-- ascii art header -->
    <div class="ascii-header">
 ╔╦╗╔═╗╦╔═╔═╗╔╗╔╦  ╦ ╦╔╦╗╦╔═╗╔═╗
  ║ ║ ║╠╩╗║╣ ║║║║  ╚╦╝ ║ ║║  ╚═╗
  ╩ ╚═╝╩ ╩╚═╝╝╚╝╩═╝╩  ╩ ╩╚═╝╚═╝</div>

    <!-- total tokens -->
    <div class="token-display">
      <div class="token-label">total tokens</div>
      <div class="token-value" id="total">...</div>
    </div>

    <!-- breakdown -->
    <div class="breakdown">
      <div class="row"><span class="label">output</span><span class="val" id="output">-</span></div>
      <div class="row"><span class="label">input</span><span class="val" id="input">-</span></div>
      <div class="row"><span class="label">cache read</span><span class="val" id="cacheRead">-</span></div>
      <div class="row"><span class="label">cache creation</span><span class="val" id="cacheCreation">-</span></div>
      <div class="row highlight"><span class="label">est. api cost</span><span class="val" id="cost">-</span></div>
      <div class="row"><span class="label">messages</span><span class="val" id="messages">-</span></div>
      <div class="row"><span class="label">sessions</span><span class="val" id="sessions">-</span></div>
    </div>

    <!-- models -->
    <div class="section">
      <div class="section-title">by model</div>
      <div id="modelBars"></div>
    </div>

    <!-- projects -->
    <div class="section">
      <div class="section-title">by project</div>
      <div id="projectBars"></div>
    </div>

    <div class="footer"><span class="dot">●</span> live &middot; refreshing every 10s</div>
  </div>

  <script>
    const f = n => n.toLocaleString();

    function renderBars(containerId, data, maxVal) {
      document.getElementById(containerId).innerHTML = data.map(d => `
        <div class="bar-row">
          <span class="bar-label">${d.name}</span>
          <div class="bar"><div class="bar-fill" style="width:${(d.val / maxVal * 100).toFixed(1)}%"></div></div>
          <span class="bar-val">${f(d.val)}</span>
        </div>
      `).join('');
    }

    async function refresh() {
      try {
        const res = await fetch('/api/usage');
        const d = await res.json();
        const t = d.totals;
        const total = t.inputTokens + t.outputTokens + t.cacheReadTokens + t.cacheCreationTokens;

        document.getElementById('total').textContent = f(total);
        document.getElementById('output').textContent = f(t.outputTokens);
        document.getElementById('input').textContent = f(t.inputTokens);
        document.getElementById('cacheRead').textContent = f(t.cacheReadTokens);
        document.getElementById('cacheCreation').textContent = f(t.cacheCreationTokens);
        document.getElementById('cost').textContent = '$' + f(d.estimatedCost.total);
        document.getElementById('messages').textContent = f(t.totalMessages);
        document.getElementById('sessions').textContent = f(t.totalSessions);

        // model bars
        const models = Object.entries(d.modelUsage)
          .map(([name, u]) => ({ name: name.replace('claude-', '').replace(/-\d{8}$/, ''), val: u.input + u.output + u.cacheRead + u.cacheCreation }))
          .sort((a, b) => b.val - a.val);
        if (models.length) renderBars('modelBars', models, models[0].val);

        // project bars (top 10)
        const projects = Object.entries(d.projectUsage)
          .map(([name, u]) => ({ name: name || '(root)', val: u.input + u.output + u.cacheRead + u.cacheCreation }))
          .sort((a, b) => b.val - a.val)
          .slice(0, 10);
        if (projects.length) renderBars('projectBars', projects, projects[0].val);
      } catch {}
    }

    refresh();
    setInterval(refresh, 10_000);
  </script>
</body>
</html>
