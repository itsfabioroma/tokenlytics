<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokenlytics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0a06;
      --surface: #141008;
      --border: #3a2e1a;
      --border-hi: #6b5530;
      --amber: #d4a032;
      --amber-dim: #8b6914;
      --amber-glow: #ffc94d;
      --rust: #a0622a;
      --text: #c4a46a;
      --muted: #6b5530;
      --green: #5fa33a;
      --red: #c44a2a;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container { max-width: 700px; width: 100%; }

    /* industrial frame */
    .frame {
      border: 2px solid var(--border);
      border-top: 3px solid var(--border-hi);
      border-left: 3px solid var(--border-hi);
      position: relative;
      background: var(--surface);
    }
    .frame::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(212,160,50,0.015) 3px, rgba(212,160,50,0.015) 4px);
      pointer-events: none;
    }

    /* header bar */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 2px solid var(--border);
      background: linear-gradient(180deg, #1a1408 0%, var(--surface) 100%);
    }
    .header-title {
      color: var(--amber);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(212,160,50,0.3);
      white-space: pre;
    }
    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--muted);
    }
    .status-light {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* gauge panel - hero */
    .gauge-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    /* main gauge */
    .main-gauge {
      padding: 24px 20px;
      border-right: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
    }
    .gauge-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .gauge-label::before { content: '>>> '; color: var(--amber-dim); }
    .gauge-value {
      font-size: 42px;
      font-weight: 700;
      color: var(--amber-glow);
      text-shadow: 0 0 20px rgba(255,201,77,0.3);
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
    }
    .gauge-trend {
      font-size: 12px;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }
    .gauge-spark { margin-top: 12px; }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .flat { color: var(--muted); }

    /* time window panel */
    .time-panel {
      padding: 12px 20px;
      border-bottom: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .time-panel .section-label {
      font-size: 9px;
      color: var(--amber-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 12px;
      border-bottom: 1px dashed rgba(107,85,48,0.3);
    }
    .time-row:last-child { border: none; }
    .time-row .label { color: var(--muted); min-width: 55px; }
    .time-row .val { color: var(--amber); font-variant-numeric: tabular-nums; font-weight: 600; }
    .time-row .trend { font-size: 10px; width: 50px; text-align: right; }

    /* sparkline rows */
    .spark-panel {
      padding: 8px 20px 12px;
      border-bottom: 2px solid var(--border);
    }
    .spark-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0;
    }
    .spark-row .label { color: var(--muted); font-size: 11px; min-width: 50px; }
    .spark-row .mid { flex: 1; }
    .spark-row .val { color: var(--amber); font-size: 11px; font-variant-numeric: tabular-nums; min-width: 80px; text-align: right; }
    .spark-row .trend { font-size: 10px; width: 50px; text-align: right; }

    /* sparkline styles */
    .sparkline-shell { position: relative; width: fit-content; overflow: visible; }
    .sparkline-svg { display: block; overflow: visible; cursor: crosshair; }
    .sparkline-badge {
      position: absolute; top: -28px; left: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px;
      border: 1px solid var(--border-hi);
      border-radius: 4px;
      background: rgba(12,10,6,0.96);
      color: var(--amber-glow);
      font-size: 11px; line-height: 1; white-space: nowrap;
      pointer-events: none; opacity: 0;
      transition: opacity 0.12s ease; z-index: 2;
    }
    .sparkline-badge.is-visible { opacity: 1; }
    .sparkline-badge .k { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    .sparkline-badge .v { font-variant-numeric: tabular-nums; }
    .sparkline-badge .t { color: var(--rust); font-size: 10px; }

    /* production lines (models) */
    .production {
      padding: 16px 20px;
    }
    .prod-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .prod-title {
      font-size: 9px;
      color: var(--amber-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .prod-title::before { content: '=[ '; }
    .prod-title::after { content: ' ]='; }
    .conveyor { color: var(--muted); font-size: 10px; }

    .model { padding: 8px 0; border-bottom: 1px solid rgba(107,85,48,0.2); }
    .model:last-child { border: none; }
    .model-head { display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .model-name { width: 130px; color: var(--rust); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar { flex: 1; height: 6px; background: rgba(107,85,48,0.2); border: 1px solid rgba(107,85,48,0.3); }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--amber-dim), var(--amber)); transition: width 0.3s; }
    .model-val { width: 100px; text-align: right; color: var(--amber); font-variant-numeric: tabular-nums; }
    .model-detail {
      display: flex; gap: 12px; padding-left: 4px; margin-top: 4px;
      font-size: 10px; color: var(--muted);
    }
    .model-detail .cost { color: var(--amber-glow); }

    /* footer */
    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      border-top: 2px solid var(--border);
      background: linear-gradient(0deg, #1a1408 0%, var(--surface) 100%);
      font-size: 10px;
      color: var(--muted);
    }
    .pipe { color: var(--border-hi); }
  </style>
</head>
<body>
  <div class="container">
    <div class="frame">

      <!-- header -->
      <div class="header-bar">
        <span class="header-title">T O K E N L Y T I C S</span>
        <div class="header-status">
          <span class="pipe">|</span>
          <span>CLAUDE CODE</span>
          <span class="pipe">|</span>
          <div class="status-light"></div>
          <span>LIVE</span>
        </div>
      </div>

      <!-- gauge + time window -->
      <div class="gauge-panel">
        <div class="main-gauge">
          <div class="gauge-label">today output</div>
          <div class="gauge-value" id="last24h">...</div>
          <div class="gauge-trend" id="trend24h"></div>
          <div class="gauge-spark" id="spark24h"></div>
        </div>

        <div class="time-panel">
          <div class="section-label">time window</div>
          <div class="time-row">
            <span class="label">7d</span>
            <span class="val" id="last7d">-</span>
            <span class="trend" id="trend7d"></span>
          </div>
          <div class="time-row">
            <span class="label">30d</span>
            <span class="val" id="last30d">-</span>
            <span class="trend" id="trend30d"></span>
          </div>
          <div class="time-row">
            <span class="label">all time</span>
            <span class="val" id="allTime">-</span>
            <span class="trend"></span>
          </div>
        </div>
      </div>

      <!-- sparkline rows -->
      <div class="spark-panel">
        <div class="spark-row">
          <span class="label">7d</span>
          <div class="mid" id="spark7d"></div>
          <span class="val" id="spark7dVal"></span>
          <span class="trend" id="spark7dTrend"></span>
        </div>
        <div class="spark-row">
          <span class="label">30d</span>
          <div class="mid" id="spark30d"></div>
          <span class="val" id="spark30dVal"></span>
          <span class="trend" id="spark30dTrend"></span>
        </div>
      </div>

      <!-- production lines (models) -->
      <div class="production">
        <div class="prod-header">
          <span class="prod-title">production lines</span>
          <span class="conveyor">+++ >>> +++ >>> +++</span>
        </div>
        <div id="modelBars"></div>
      </div>

      <!-- footer -->
      <div class="footer-bar">
        <span><span class="pipe">[</span> REAL-TIME TOKEN MONITOR <span class="pipe">]</span></span>
        <span>refresh 3s <span class="pipe">|</span> <span id="lastUpdate">--:--:--</span></span>
      </div>

    </div>
  </div>

  <script>
    const f = n => n.toLocaleString();
    const tokenLabel = n => `${f(n)} token${n === 1 ? '' : 's'}`;

    function buildHourlyLabels(length) {
      const now = new Date();
      now.setMinutes(0, 0, 0);
      return Array.from({ length }, (_, i) => {
        const date = new Date(now);
        date.setHours(now.getHours() - (length - 1 - i));
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      });
    }

    function buildDailyLabels(length) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return Array.from({ length }, (_, i) => {
        const date = new Date(today);
        date.setDate(today.getDate() - (length - 1 - i));
        return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
      });
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getSparkPoints(data, width, height) {
      const max = Math.max(...data) || 1;
      const step = data.length > 1 ? width / (data.length - 1) : 0;
      return data.map((value, index) => ({
        value,
        x: data.length > 1 ? index * step : width / 2,
        y: height - (value / max) * height * 0.85,
      }));
    }

    function renderSparkline(targetId, data, width, height, color, labels = []) {
      const target = document.getElementById(targetId);
      if (!target) return;
      if (!data || !data.length) { target.innerHTML = ''; return; }

      const points = getSparkPoints(data, width, height);
      const linePoints = points.map(({ x, y }) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
      const fillPoints = `0,${height} ${linePoints} ${width},${height}`;

      target.innerHTML = `
        <div class="sparkline-shell" style="width:${width}px">
          <div class="sparkline-badge">
            <span class="k">used</span>
            <span class="v"></span>
            <span class="t"></span>
          </div>
          <svg class="sparkline-svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
            <polygon points="${fillPoints}" fill="${color}" opacity="0.12"></polygon>
            <polyline points="${linePoints}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"></polyline>
            <line x1="0" y1="0" x2="0" y2="${height}" stroke="${color}" stroke-opacity="0.3" stroke-width="1" visibility="hidden"></line>
            <circle cx="0" cy="0" r="4" fill="${color}" stroke="var(--bg)" stroke-width="1.5" visibility="hidden"></circle>
            <rect x="0" y="0" width="${width}" height="${height}" fill="transparent"></rect>
          </svg>
        </div>
      `;

      const badge = target.querySelector('.sparkline-badge');
      const badgeValue = target.querySelector('.sparkline-badge .v');
      const badgeTime = target.querySelector('.sparkline-badge .t');
      const svg = target.querySelector('.sparkline-svg');
      const guide = svg.querySelector('line');
      const dot = svg.querySelector('circle');

      const showPoint = (index) => {
        const point = points[index];
        badgeValue.textContent = tokenLabel(point.value);
        badgeTime.textContent = labels[index] || '';
        badge.classList.add('is-visible');
        guide.setAttribute('x1', point.x.toFixed(1));
        guide.setAttribute('x2', point.x.toFixed(1));
        guide.setAttribute('visibility', 'visible');
        dot.setAttribute('cx', point.x.toFixed(1));
        dot.setAttribute('cy', point.y.toFixed(1));
        dot.setAttribute('visibility', 'visible');
        const bw = badge.offsetWidth || 0;
        badge.style.left = `${clamp(point.x, bw/2+6, width-bw/2-6)}px`;
        badge.style.transform = 'translateX(-50%)';
      };

      const hidePoint = () => {
        badge.classList.remove('is-visible');
        guide.setAttribute('visibility', 'hidden');
        dot.setAttribute('visibility', 'hidden');
      };

      const nearest = (cx) => {
        const rect = svg.getBoundingClientRect();
        const rx = clamp(((cx - rect.left) / rect.width) * width, 0, width);
        if (points.length === 1) return 0;
        return clamp(Math.round(rx / (width / (points.length - 1))), 0, points.length - 1);
      };

      svg.addEventListener('mouseenter', e => showPoint(nearest(e.clientX)));
      svg.addEventListener('mousemove', e => showPoint(nearest(e.clientX)));
      svg.addEventListener('mouseleave', hidePoint);
      svg.addEventListener('touchstart', e => { if (e.touches[0]) showPoint(nearest(e.touches[0].clientX)); }, { passive: true });
      svg.addEventListener('touchmove', e => { if (e.touches[0]) showPoint(nearest(e.touches[0].clientX)); }, { passive: true });
      svg.addEventListener('touchend', hidePoint, { passive: true });
    }

    function trendStr(current, previous) {
      if (!previous) return '<span class="flat">-</span>';
      const pct = ((current - previous) / previous * 100);
      if (Math.abs(pct) < 1) return '<span class="flat">~</span>';
      const arrow = pct > 0 ? '▲' : '▼';
      const cls = pct > 0 ? 'up' : 'down';
      return `<span class="${cls}">${arrow}${Math.abs(pct).toFixed(0)}%</span>`;
    }

    async function refresh() {
      try {
        const res = await fetch('/api/usage');
        const d = await res.json();
        const w = d.windows;
        const s = d.sparklines;

        // gauge
        document.getElementById('last24h').textContent = f(w.last24h);
        document.getElementById('trend24h').innerHTML = 'vs yesterday: ' + trendStr(w.last24h, w.prev24h);
        renderSparkline('spark24h', s.last24h, 280, 36, '#d4a032', buildHourlyLabels(s.last24h.length));

        // time window
        document.getElementById('last7d').textContent = f(w.last7d);
        document.getElementById('trend7d').innerHTML = trendStr(w.last7d, w.prev7d);
        document.getElementById('last30d').textContent = f(w.last30d);
        document.getElementById('trend30d').innerHTML = trendStr(w.last30d, w.prev30d);
        document.getElementById('allTime').textContent = f(w.allTime);

        // sparkline rows
        renderSparkline('spark7d', s.last7d, 240, 20, '#d4a032', buildDailyLabels(s.last7d.length));
        document.getElementById('spark7dVal').textContent = f(w.last7d);
        document.getElementById('spark7dTrend').innerHTML = trendStr(w.last7d, w.prev7d);
        renderSparkline('spark30d', s.last30d, 240, 20, '#d4a032', buildDailyLabels(s.last30d.length));
        document.getElementById('spark30dVal').textContent = f(w.last30d);
        document.getElementById('spark30dTrend').innerHTML = trendStr(w.last30d, w.prev30d);

        // timestamp
        document.getElementById('lastUpdate').textContent = new Date(d.lastUpdated).toLocaleTimeString();

        // production lines
        const models = Object.entries(d.modelUsage)
          .map(([name, u]) => ({
            name: name.replace('claude-', '').replace(/-\d{8}$/, ''),
            tokens: u.input + u.output,
            cost: d.estimatedCost.breakdown[name] || 0,
            input: u.input, output: u.output, cacheRead: u.cacheRead, messages: u.messages,
          }))
          .filter(m => m.tokens > 0)
          .sort((a, b) => b.tokens - a.tokens);

        const maxT = models[0]?.tokens || 1;
        document.getElementById('modelBars').innerHTML = models.map(m => `
          <div class="model">
            <div class="model-head">
              <span class="model-name">${m.name}</span>
              <div class="bar"><div class="bar-fill" style="width:${(m.tokens/maxT*100).toFixed(1)}%"></div></div>
              <span class="model-val">${f(m.tokens)}</span>
            </div>
            <div class="model-detail">
              <span>out:${f(m.output)}</span>
              <span>in:${f(m.input)}</span>
              <span>cache:${f(m.cacheRead)}</span>
              <span class="cost">$${f(m.cost)}</span>
            </div>
          </div>
        `).join('');
      } catch {}
    }

    refresh();
    setInterval(refresh, 3_000);
  </script>
</body>
</html>
