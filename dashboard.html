<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokenlytics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
      background: #0a0a0a;
      color: #c8c8c8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container { max-width: 640px; width: 100%; }

    .ascii-header {
      color: #666;
      font-size: 11px;
      line-height: 1.3;
      margin-bottom: 32px;
      white-space: pre;
      display: flex;
      justify-content: center;
    }

    /* hero */
    .hero {
      border: 1px solid #222;
      padding: 32px;
      margin-bottom: 16px;
    }
    .hero .label { display: flex; align-items: baseline; gap: 8px; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .hero .measure { color: #3f3f3f; font-size: 9px; letter-spacing: 1px; text-transform: lowercase; }
    .hero .value { font-size: 48px; font-weight: 700; color: #fff; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
    .hero .trend { font-size: 13px; margin-top: 6px; font-variant-numeric: tabular-nums; }
    .hero .spark { margin-top: 16px; }
    .up { color: #34d399; }
    .down { color: #ef4444; }
    .flat { color: #555; }

    /* rows */
    .windows { border: 1px solid #222; border-top: none; padding: 16px 32px; }
    .row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: 13px; border-bottom: 1px solid #151515;
    }
    .row:last-child { border: none; }
    .row .label { color: #555; min-width: 60px; }
    .row .mid { flex: 1; padding: 0 12px; }
    .row .right { display: flex; gap: 12px; align-items: center; }
    .row .val { color: #999; font-variant-numeric: tabular-nums; }
    .row .trend { font-size: 11px; width: 60px; text-align: right; }

    .sparkline-shell { position: relative; width: fit-content; overflow: visible; }
    .sparkline-svg { display: block; overflow: visible; cursor: crosshair; }
    .sparkline-badge {
      position: absolute;
      top: -28px;
      left: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      background: rgba(10, 10, 10, 0.96);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      z-index: 2;
    }
    .sparkline-badge.is-visible { opacity: 1; }
    .sparkline-badge .k {
      color: #666;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .sparkline-badge .v { font-variant-numeric: tabular-nums; }
    .sparkline-badge .t { color: #777; font-size: 10px; }

    /* stats grid */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px; font-size: 12px;
    }
    .stats-grid .stat { display: flex; justify-content: space-between; padding: 4px 0; }
    .stats-grid .stat .k { color: #555; }
    .stats-grid .stat .v { color: #999; font-variant-numeric: tabular-nums; }
    .stats-grid .stat .v.highlight { color: #c084fc; }

    /* heatmap */
    .heatmap { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 8px; }
    .heatmap-cell {
      width: 10px; height: 10px; border-radius: 2px; background: #151515;
    }

  </style>
</head>
<body>
  <div class="container">

    <div class="ascii-header">
o-O-o  o-o  o  o o--o o   o o    o   o o-O-o o-O-o   o-o  o-o
  |   o   o | /  |    |\  | |     \ /    |     |    /    |
  |   |   | OO   O-o  | \ | |      O     |     |   O      o-o
  |   o   o | \  |    |  \| |      |     |     |    \        |
  o    o-o  o  o o--o o   o O---o  o     o   o-O-o   o-o o--o</div>

    <!-- hero: last 24h -->
    <div class="hero">
      <div class="label">last 24h <span class="measure">input + output</span></div>
      <div class="value" id="last24h">...</div>
      <div class="trend" id="trend24h"></div>
      <div class="spark" id="spark24h"></div>
    </div>

    <!-- time windows -->
    <div class="windows">
      <div class="row">
        <span class="label">last 7d</span>
        <div class="mid" id="spark7d"></div>
        <div class="right">
          <span class="val" id="last7d">-</span>
          <span class="trend" id="trend7d"></span>
        </div>
      </div>
      <div class="row">
        <span class="label">last 30d</span>
        <div class="mid" id="spark30d"></div>
        <div class="right">
          <span class="val" id="last30d">-</span>
          <span class="trend" id="trend30d"></span>
        </div>
      </div>
      <div class="row">
        <span class="label">all time</span>
        <div class="mid"></div>
        <div class="right">
          <span class="val" id="allTime">-</span>
          <span class="trend" style="width:60px"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const f = n => n.toLocaleString();
    const tokenLabel = n => `${f(n)} token${n === 1 ? '' : 's'}`;

    function buildHourlyLabels(length) {
      const now = new Date();
      now.setMinutes(0, 0, 0);
      return Array.from({ length }, (_, i) => {
        const date = new Date(now);
        date.setHours(now.getHours() - (length - 1 - i));
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      });
    }

    function buildDailyLabels(length) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return Array.from({ length }, (_, i) => {
        const date = new Date(today);
        date.setDate(today.getDate() - (length - 1 - i));
        return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
      });
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getSparkPoints(data, width, height) {
      const max = Math.max(...data) || 1;
      const step = data.length > 1 ? width / (data.length - 1) : 0;
      return data.map((value, index) => ({
        value,
        x: data.length > 1 ? index * step : width / 2,
        y: height - (value / max) * height * 0.85,
      }));
    }

    function renderSparkline(targetId, data, width, height, color, labels = []) {
      const target = document.getElementById(targetId);
      if (!target) return;
      if (!data || !data.length) {
        target.innerHTML = '';
        return;
      }

      const points = getSparkPoints(data, width, height);
      const linePoints = points.map(({ x, y }) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
      const fillPoints = `0,${height} ${linePoints} ${width},${height}`;

      target.innerHTML = `
        <div class="sparkline-shell" style="width:${width}px">
          <div class="sparkline-badge">
            <span class="k">used</span>
            <span class="v"></span>
            <span class="t"></span>
          </div>
          <svg class="sparkline-svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
            <polygon points="${fillPoints}" fill="${color}" opacity="0.15"></polygon>
            <polyline points="${linePoints}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"></polyline>
            <line x1="0" y1="0" x2="0" y2="${height}" stroke="${color}" stroke-opacity="0.3" stroke-width="1" visibility="hidden"></line>
            <circle cx="0" cy="0" r="4" fill="${color}" stroke="#0a0a0a" stroke-width="1.5" visibility="hidden"></circle>
            <rect x="0" y="0" width="${width}" height="${height}" fill="transparent"></rect>
          </svg>
        </div>
      `;

      const badge = target.querySelector('.sparkline-badge');
      const badgeValue = target.querySelector('.sparkline-badge .v');
      const badgeTime = target.querySelector('.sparkline-badge .t');
      const svg = target.querySelector('.sparkline-svg');
      const guide = svg.querySelector('line');
      const dot = svg.querySelector('circle');

      const showPoint = (index) => {
        const point = points[index];
        const label = labels[index] || '';

        badgeValue.textContent = tokenLabel(point.value);
        badgeTime.textContent = label;
        badge.classList.add('is-visible');

        guide.setAttribute('x1', point.x.toFixed(1));
        guide.setAttribute('x2', point.x.toFixed(1));
        guide.setAttribute('visibility', 'visible');

        dot.setAttribute('cx', point.x.toFixed(1));
        dot.setAttribute('cy', point.y.toFixed(1));
        dot.setAttribute('visibility', 'visible');

        const badgeWidth = badge.offsetWidth || 0;
        const badgeCenter = clamp(point.x, badgeWidth / 2 + 6, width - badgeWidth / 2 - 6);
        badge.style.left = `${badgeCenter}px`;
        badge.style.transform = 'translateX(-50%)';
      };

      const hidePoint = () => {
        badge.classList.remove('is-visible');
        guide.setAttribute('visibility', 'hidden');
        dot.setAttribute('visibility', 'hidden');
      };

      const getNearestIndex = (clientX) => {
        const rect = svg.getBoundingClientRect();
        const relativeX = clamp(((clientX - rect.left) / rect.width) * width, 0, width);
        if (points.length === 1) return 0;
        const step = width / (points.length - 1);
        return clamp(Math.round(relativeX / step), 0, points.length - 1);
      };

      svg.addEventListener('mouseenter', (event) => showPoint(getNearestIndex(event.clientX)));
      svg.addEventListener('mousemove', (event) => showPoint(getNearestIndex(event.clientX)));
      svg.addEventListener('mouseleave', hidePoint);
      svg.addEventListener('touchstart', (event) => {
        const touch = event.touches[0];
        if (!touch) return;
        showPoint(getNearestIndex(touch.clientX));
      }, { passive: true });
      svg.addEventListener('touchmove', (event) => {
        const touch = event.touches[0];
        if (!touch) return;
        showPoint(getNearestIndex(touch.clientX));
      }, { passive: true });
      svg.addEventListener('touchend', hidePoint, { passive: true });
    }

    // trend arrow
    function trendStr(current, previous) {
      if (!previous) return '<span class="flat">—</span>';
      const pct = ((current - previous) / previous * 100);
      if (Math.abs(pct) < 1) return '<span class="flat">~ same</span>';
      const arrow = pct > 0 ? '▲' : '▼';
      const cls = pct > 0 ? 'up' : 'down';
      return `<span class="${cls}">${arrow} ${Math.abs(pct).toFixed(0)}%</span>`;
    }

    function renderUsage(d) {
      const w = d.windows;
      const s = d.sparklines;
      const labels24h = buildHourlyLabels(s.last24h.length);
      const labels7d = buildDailyLabels(s.last7d.length);
      const labels30d = buildDailyLabels(s.last30d.length);

      // hero
      document.getElementById('last24h').textContent = f(w.last24h);
      document.getElementById('trend24h').innerHTML = 'vs previous 24h: ' + trendStr(w.last24h, w.prev24h);
      renderSparkline('spark24h', s.last24h, 576, 40, '#34d399', labels24h);

      // windows
      document.getElementById('last7d').textContent = f(w.last7d);
      document.getElementById('trend7d').innerHTML = trendStr(w.last7d, w.prev7d);
      renderSparkline('spark7d', s.last7d, 200, 24, '#34d399', labels7d);
      document.getElementById('last30d').textContent = f(w.last30d);
      document.getElementById('trend30d').innerHTML = trendStr(w.last30d, w.prev30d);
      renderSparkline('spark30d', s.last30d, 200, 24, '#34d399', labels30d);
      document.getElementById('allTime').textContent = f(w.allTime);
    }

    async function refresh() {
      try {
        const res = await fetch('/api/usage', { cache: 'no-store' });
        renderUsage(await res.json());
      } catch {}
    }

    let pollTimer = null;
    let realtimeRetry = null;
    let realtimeSource = null;
    let firstRealtimeEventTimer = null;
    let hasRealtimeRender = false;

    function startPolling() {
      if (pollTimer) return;
      refresh();
      pollTimer = setInterval(refresh, 1_000);
    }

    function stopPolling() {
      if (!pollTimer) return;
      clearInterval(pollTimer);
      pollTimer = null;
    }

    function scheduleRealtimeRetry() {
      if (realtimeRetry) return;
      realtimeRetry = setTimeout(() => {
        realtimeRetry = null;
        startRealtime();
      }, 5_000);
    }

    function closeRealtime() {
      if (firstRealtimeEventTimer) {
        clearTimeout(firstRealtimeEventTimer);
        firstRealtimeEventTimer = null;
      }
      if (realtimeSource) {
        realtimeSource.close();
        realtimeSource = null;
      }
    }

    function startRealtime() {
      if (!window.EventSource) {
        startPolling();
        return;
      }
      if (realtimeSource) return;

      closeRealtime();
      hasRealtimeRender = false;

      realtimeSource = new EventSource('/api/stream');
      firstRealtimeEventTimer = setTimeout(() => {
        if (!hasRealtimeRender) {
          closeRealtime();
          startPolling();
          scheduleRealtimeRetry();
        }
      }, 3_000);

      realtimeSource.addEventListener('usage', (event) => {
        try {
          renderUsage(JSON.parse(event.data));
          hasRealtimeRender = true;
          if (firstRealtimeEventTimer) {
            clearTimeout(firstRealtimeEventTimer);
            firstRealtimeEventTimer = null;
          }
          stopPolling();
        } catch {}
      });

      realtimeSource.addEventListener('error', () => {
        if (!hasRealtimeRender) {
          closeRealtime();
          startPolling();
          scheduleRealtimeRetry();
        }
      });
    }

    startRealtime();
  </script>
</body>
</html>
