<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokenlytics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
      background: #0a0a0a;
      color: #c8c8c8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container { max-width: 640px; width: 100%; }

    .ascii-header {
      color: #666;
      font-size: 11px;
      line-height: 1.3;
      margin-bottom: 32px;
      white-space: pre;
    }

    /* hero: last 24h */
    .hero {
      border: 1px solid #222;
      padding: 32px;
      margin-bottom: 16px;
    }
    .hero .label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .hero .value {
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
    }
    .hero .trend {
      font-size: 13px;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }
    .up { color: #34d399; }
    .down { color: #ef4444; }
    .flat { color: #555; }

    /* time window rows */
    .windows {
      border: 1px solid #222;
      border-top: none;
      padding: 16px 32px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid #151515;
    }
    .row:last-child { border: none; }
    .row .label { color: #555; }
    .row .right { display: flex; gap: 16px; align-items: center; }
    .row .val { color: #999; font-variant-numeric: tabular-nums; }
    .row .trend { font-size: 11px; width: 70px; text-align: right; }

    /* sections */
    .section {
      margin-top: 24px;
      border: 1px solid #222;
      padding: 16px 32px;
    }
    .section-title {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* model bars */
    .model {
      padding: 8px 0;
      border-bottom: 1px solid #151515;
    }
    .model:last-child { border: none; }
    .model-head {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
    }
    .model-name { width: 160px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar { flex: 1; height: 8px; background: #151515; }
    .bar-fill { height: 100%; background: #333; transition: width 0.3s; }
    .model-val { width: 120px; text-align: right; color: #666; font-variant-numeric: tabular-nums; }
    .model-detail {
      display: flex;
      gap: 16px;
      padding-left: 4px;
      margin-top: 4px;
      font-size: 11px;
      color: #444;
    }
    .model-detail .cost { color: #c084fc; }

    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: #333;
      text-align: center;
    }
    .dot { color: #34d399; animation: blink 2s infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
  </style>
</head>
<body>
  <div class="container">

    <div class="ascii-header">
 ╔╦╗╔═╗╦╔═╔═╗╔╗╔╦  ╦ ╦╔╦╗╦╔═╗╔═╗
  ║ ║ ║╠╩╗║╣ ║║║║  ╚╦╝ ║ ║║  ╚═╗
  ╩ ╚═╝╩ ╩╚═╝╝╚╝╩═╝╩  ╩ ╩╚═╝╚═╝</div>

    <!-- hero: last 24h -->
    <div class="hero">
      <div class="label">last 24 hours</div>
      <div class="value" id="last24h">...</div>
      <div class="trend" id="trend24h"></div>
    </div>

    <!-- other windows -->
    <div class="windows">
      <div class="row">
        <span class="label">last 7d</span>
        <div class="right">
          <span class="val" id="last7d">-</span>
          <span class="trend" id="trend7d"></span>
        </div>
      </div>
      <div class="row">
        <span class="label">last 30d</span>
        <div class="right">
          <span class="val" id="last30d">-</span>
          <span class="trend" id="trend30d"></span>
        </div>
      </div>
      <div class="row">
        <span class="label">all time</span>
        <div class="right">
          <span class="val" id="allTime">-</span>
          <span class="trend" style="width:70px"></span>
        </div>
      </div>
    </div>

    <!-- models -->
    <div class="section">
      <div class="section-title">by model</div>
      <div id="modelBars"></div>
    </div>

    <div class="footer"><span class="dot">●</span> live &middot; refreshing every 3s</div>
  </div>

  <script>
    const f = n => n.toLocaleString();

    // trend: compare current vs previous period
    function trendStr(current, previous) {
      if (!previous) return '<span class="flat">—</span>';
      const pct = ((current - previous) / previous * 100);
      if (Math.abs(pct) < 1) return '<span class="flat">~ same</span>';
      const arrow = pct > 0 ? '▲' : '▼';
      const cls = pct > 0 ? 'up' : 'down';
      return `<span class="${cls}">${arrow} ${Math.abs(pct).toFixed(0)}%</span>`;
    }

    async function refresh() {
      try {
        const res = await fetch('/api/usage');
        const d = await res.json();
        const w = d.windows;

        // hero
        document.getElementById('last24h').textContent = f(w.last24h);
        document.getElementById('trend24h').innerHTML = 'vs prev 24h: ' + trendStr(w.last24h, w.prev24h);

        // windows
        document.getElementById('last7d').textContent = f(w.last7d);
        document.getElementById('trend7d').innerHTML = trendStr(w.last7d, w.prev7d);
        document.getElementById('last30d').textContent = f(w.last30d);
        document.getElementById('trend30d').innerHTML = trendStr(w.last30d, w.prev30d);
        document.getElementById('allTime').textContent = f(w.allTime);

        // models
        const models = Object.entries(d.modelUsage)
          .map(([name, u]) => ({
            name: name.replace('claude-', '').replace(/-\d{8}$/, ''),
            tokens: u.input + u.output,
            cost: d.estimatedCost.breakdown[name] || 0,
            input: u.input,
            output: u.output,
            cacheRead: u.cacheRead,
            messages: u.messages,
          }))
          .filter(m => m.tokens > 0)
          .sort((a, b) => b.tokens - a.tokens);

        const maxTokens = models[0]?.tokens || 1;

        document.getElementById('modelBars').innerHTML = models.map(m => `
          <div class="model">
            <div class="model-head">
              <span class="model-name">${m.name}</span>
              <div class="bar"><div class="bar-fill" style="width:${(m.tokens / maxTokens * 100).toFixed(1)}%"></div></div>
              <span class="model-val">${f(m.tokens)}</span>
            </div>
            <div class="model-detail">
              <span>out: ${f(m.output)}</span>
              <span>in: ${f(m.input)}</span>
              <span>cache: ${f(m.cacheRead)}</span>
              <span>msgs: ${f(m.messages)}</span>
              <span class="cost">$${f(m.cost)}</span>
            </div>
          </div>
        `).join('');
      } catch {}
    }

    refresh();
    setInterval(refresh, 3_000);
  </script>
</body>
</html>
